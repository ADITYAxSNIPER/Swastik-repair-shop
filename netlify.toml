[build]
  base      = "."
  command   = "pnpm --filter @workspace/swastik-mobile run build"
  publish   = "artifacts/swastik-mobile/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH    = "/"
  PORT         = "3000"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
